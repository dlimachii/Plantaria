services:
  postgis:
    image: postgis/postgis:16-3.5
    container_name: plantaria-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: plantaria
      POSTGRES_USER: plantaria
      POSTGRES_PASSWORD: plantaria
    ports:
      - "5432:5432"
    volumes:
      - plantaria_postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantaria -d plantaria"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  plantaria_postgis_data:
